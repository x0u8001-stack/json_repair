<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JSON Repair API</title>
</head>
<body>
<script>
const params = new URLSearchParams(window.location.search);
const inputJson = params.get('json');
const schema = params.get('schema');
const mode = params.get('mode') || 'standard';

if (!inputJson) {
    document.body.textContent = JSON.stringify({input: null, output: null}, null, 2);
} else {
    fetch('https://mangiucugna.pythonanywhere.com/api/repair', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({json: inputJson, schema, mode})
    })
    .then(r => r.json())
    .then(data => {
        const response = {
            input: inputJson,
            output: data.json || null
        };
        document.body.textContent = JSON.stringify(response, null, 2);
    })
    .catch(e => {
        const response = {
            input: inputJson,
            output: null,
            error: e.message
        };
        document.body.textContent = JSON.stringify(response, null, 2);
    });
}
</script>
</body>
</html>

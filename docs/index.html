<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JSON Repair API</title>
</head>
<body>
<script>
const params = new URLSearchParams(window.location.search);
const json = params.get('json');
const schema = params.get('schema');
const mode = params.get('mode') || 'standard';

if (!json) {
    document.body.textContent = '';
    document.documentElement.innerHTML = '';
} else {
    fetch('https://mangiucugna.pythonanywhere.com/api/repair', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({json, schema, mode})
    })
    .then(r => r.json())
    .then(data => {
        document.body.textContent = data.json || '';
        document.documentElement.innerHTML = '<pre>' + (data.json || '') + '</pre>';
    })
    .catch(e => {
        document.body.textContent = JSON.stringify({error: e.message});
    });
}
</script>
</body>
</html>
